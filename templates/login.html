<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Admin - Login</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>

<body>
    <div class="login-container">
        <div class="login-card glass-card">
            <div class="login-header">
                <div class="login-icon">🔐</div>
                <h1>Network Admin</h1>
                <p>Sign in to manage your network</p>
            </div>

            {% if error %}
            <div class="error-message">
                <span class="error-icon">⚠️</span>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter your username" required
                        autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="password-wrapper">
                        <input type="password" name="password" id="passwordInput" class="form-control" placeholder="Enter your password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword()" aria-label="Toggle password visibility">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-eye" viewBox="0 0 16 16" id="eyeIcon">
                                <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/>
                                <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 submit-btn">Sign In</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());
            const errorDiv = document.querySelector('.error-message') || createErrorDiv();

            try {
                const response = await fetch('/auth', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    const result = await response.json();
                    window.location.replace('/dashboard');
                } else {
                    const result = await response.json();
                    showError(result.message || 'Invalid username or password');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('An error occurred. Please try again.');
            }

            function createErrorDiv() {
                const div = document.createElement('div');
                div.className = 'error-message';
                div.innerHTML = '<span class="error-icon">⚠️</span><span></span>';
                const header = document.querySelector('.login-header');
                header.parentNode.insertBefore(div, header.nextSibling);
                return div;
            }

            function showError(msg) {
                const div = document.querySelector('.error-message') || createErrorDiv();
                div.querySelector('span:last-child').textContent = msg;
                div.style.display = 'flex';
            }
        });

        // Protect login page:
        // Try /dashboard once; if server bounces back to /, stop (prevents loops).
        (function protectLogin() {
            const bounced = sessionStorage.getItem('loginBounce') === '1';
            if (bounced) {
                sessionStorage.removeItem('loginBounce');
                return;
            }
            sessionStorage.setItem('loginBounce', '1');
            window.location.replace('/dashboard');
        })();

        function togglePassword() {
            const passwordInput = document.getElementById('passwordInput');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                // Switch to eye-slash (hidden)
                eyeIcon.innerHTML = `
                    <path d="M13.359 11.238C15.06 9.72 16 8 16 8s-3-5.5-8-5.5a7.028 7.028 0 0 0-2.79.588l.77.771A5.944 5.944 0 0 1 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.134 13.134 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755-.165.165-.337.328-.517.486l.708.709z"/>
                    <path d="M11.297 9.331L5.999 4.032 5.632 3.665 4.066 2.099 2.167.2 1.46.907l1.372 1.372a12.19 12.19 0 0 0-1.66 2.043C.12 4.668 0 8 0 8s3 5.5 8 5.5c1.567 0 3.034-.614 4.256-1.642l1.638 1.637.708-.709-1.303-1.303zm-5.69-5.69l4.333 4.333a3.502 3.502 0 0 1-4.333-4.333zM8 11.5c-2.12 0-3.879-1.168-5.168-2.457a13.133 13.133 0 0 1 1.17-1.83l1.196 1.196a3.503 3.503 0 0 0 4.634 4.634l1.196 1.196C9.916 11.398 8.975 11.5 8 11.5z"/>
                `;
                eyeIcon.classList.remove('bi-eye');
                eyeIcon.classList.add('bi-eye-slash');
            } else {
                passwordInput.type = 'password';
                // Switch back to eye (visible)
                eyeIcon.innerHTML = `
                    <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/>
                    <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/>
                `;
                eyeIcon.classList.remove('bi-eye-slash');
                eyeIcon.classList.add('bi-eye');
            }
        }
    </script>

    <footer class="footer">
        <div class="footer-content">
            Developed and Designed by <span class="developer-name">Mahmoud Reda</span> <span
                class="footer-divider">•</span> <span class="developer-name">Mahmoud Ali</span>
        </div>
    </footer>
</body>

</html>
