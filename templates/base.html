<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Network Management{% endblock %}</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script>
        // If user hits Back/Forward after logout, browsers may show a cached page (BFCache)
        // without re-requesting from the server. Force a real reload on back/forward nav so
        // server-side session protection runs immediately (prevents showing cached dashboard).
        function shouldForceReloadOnShow(e) {
            if (e && e.persisted) return true;
            try {
                const nav = performance.getEntriesByType && performance.getEntriesByType('navigation');
                const type = nav && nav[0] && nav[0].type;
                return type === 'back_forward';
            } catch (_) {
                return false;
            }
        }

        window.addEventListener('pageshow', function (e) {
            if (shouldForceReloadOnShow(e)) {
                window.location.reload();
            }
        });
    </script>
    {% block head %}{% endblock %}
</head>

<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">🌐</div>
                <h2 class="sidebar-title">NetAdmin</h2>
            </div>
            
            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-link {% if request.path == '/dashboard' %}active{% endif %}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M8 3.5a.5.5 0 0 0-1 0V9a.5.5 0 0 0 .252.434l3.5 2a.5.5 0 0 0 .496-.868L8 8.71V3.5z"/>
                        <path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm7-8A7 7 0 1 1 1 8a7 7 0 0 1 14 0z"/>
                    </svg>
                    Dashboard
                </a>
                <a href="/portmapping" class="nav-link {% if request.path == '/portmapping' %}active{% endif %}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M1 2.5A1.5 1.5 0 0 1 2.5 1h3A1.5 1.5 0 0 1 7 2.5v3A1.5 1.5 0 0 1 5.5 7h-3A1.5 1.5 0 0 1 1 5.5v-3zM2.5 2a.5.5 0 0 0-.5.5v3a.5.5 0 0 0 .5.5h3a.5.5 0 0 0 .5-.5v-3a.5.5 0 0 0-.5-.5h-3zm6.5.5A1.5 1.5 0 0 1 10.5 1h3A1.5 1.5 0 0 1 15 2.5v3A1.5 1.5 0 0 1 13.5 7h-3A1.5 1.5 0 0 1 9 5.5v-3zm1.5-.5a.5.5 0 0 0-.5.5v3a.5.5 0 0 0 .5.5h3a.5.5 0 0 0 .5-.5v-3a.5.5 0 0 0-.5-.5h-3zM1 10.5A1.5 1.5 0 0 1 2.5 9h3A1.5 1.5 0 0 1 7 10.5v3A1.5 1.5 0 0 1 5.5 15h-3A1.5 1.5 0 0 1 1 13.5v-3zm1.5-.5a.5.5 0 0 0-.5.5v3a.5.5 0 0 0 .5.5h3a.5.5 0 0 0 .5-.5v-3a.5.5 0 0 0-.5-.5h-3zm6.5.5A1.5 1.5 0 0 1 10.5 9h3a1.5 1.5 0 0 1 1.5 1.5v3a1.5 1.5 0 0 1-1.5 1.5h-3A1.5 1.5 0 0 1 9 13.5v-3zm1.5-.5a.5.5 0 0 0-.5.5v3a.5.5 0 0 0 .5.5h3a.5.5 0 0 0 .5-.5v-3a.5.5 0 0 0-.5-.5h-3z"/>
                    </svg>
                    Port Mapping
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="#" class="nav-link logout-link" onclick="logout(); return false;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                        <path fill-rule="evenodd" d="M10 12.5a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 1 0v-2A1.5 1.5 0 0 0 9.5 2h-8A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0v2z"/>
                        <path fill-rule="evenodd" d="M15.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L14.293 7.5H5.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708l3-3z"/>
                    </svg>
                    Sign Out
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Breadcrumbs -->
            <div class="top-bar">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="/dashboard">Home</a></li>
                        {% block breadcrumbs %}{% endblock %}
                    </ol>
                </nav>
            </div>

            <div class="content-wrapper">
                {% block content %}{% endblock %}
            </div>

            <footer class="footer">
                <div class="footer-content">
                    Developed and Designed by <span class="developer-name">Mahmoud Reda</span>
                    <span class="footer-divider">•</span>
                    <span class="developer-name">Mahmoud Ali</span>
                </div>
            </footer>
        </main>
    </div>

    {% block scripts %}{% endblock %}
    <script>
        function logout() {
            // Best-effort client-side logout for builds without a /logout endpoint:
            // expire the Flask session cookie so the server treats the user as logged out.
            try {
                document.cookie = 'session=; Max-Age=0; path=/';
                document.cookie = 'session=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/';
            } catch (e) {
                // ignore
            }
            window.location.replace('/');
        }
    </script>
</body>
</html>
